<!DOCTYPE html>
<html>
<head>
  <title>Ferretería Lopez</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
      margin: 20px;
    }

    .banner {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .producto {
      background: white;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
    }

    button {
      background: green;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: darkgreen;
    }
  </style>
</head>

<body>

<!-- ✅ BANNER CORRECTO (ESTA ES LA LINEA CLAVE) -->
<img src="{{ url_for('static', filename='img/general.jpg') }}" class="banner" alt="Ferretería">

<h1>Ferretería Lopez</h1>

<div class="grid">

  {% for p in productos %}
  <div class="producto">

    <h3>{{ p.nombre }}</h3>
    <p>$ {{ p.precio }}</p>

    <button onclick="consultar('{{ p.nombre }}')">
      Consultar
    </button>

  </div>
  {% endfor %}

</div>

<script>
function consultar(nombre){
  window.open(
    "https://wa.me/5492615362816?text=Hola%20quiero%20consultar%20por%20" + nombre
  );
}
</script>

</body>
</html>
