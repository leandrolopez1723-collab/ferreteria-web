<!DOCTYPE html>
<html>
<head>
  <title>Ferretería Lopez</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
      margin: 20px;
    }

    /* ✅ BANNER */
    .banner {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    /* ✅ GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    /* ✅ PRODUCTOS */
    .producto {
      background: white;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
    }

    button {
      background: green;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: darkgreen;
    }
  </style>
</head>

<body>

<!-- ✅ ESTA ES LA LINEA CORRECTA DEL BANNER -->
<img src="{{ url_for('static', filename='img/general.jpg') }}" class="banner" alt="Ferretería">
